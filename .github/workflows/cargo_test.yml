run-name: "Cargo test"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # Ark needs a real R at runtime. Install it out-of-band; the script
      # only downloads the ark binary and writes the kernelspec.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.0"

      # Cache the ark binary (~40MB download) and the ipykernel venv
      # (~a few seconds to reinstall). Keyed on the install script so any
      # version bump invalidates the cache automatically.
      - name: Cache dev kernels
        uses: actions/cache@v4
        with:
          path: |
            test-kernels/ark
            .jet-dev/venv
          key: ${{ runner.os }}-dev-kernels-${{ hashFiles('scripts/install-dev-kernels.sh') }}

      - name: Install dev kernels
        run: ./scripts/install-dev-kernels.sh

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        id: cargo_test
        run: make test-cargo

      # Kernel-startup failures show up in tests as "kernel not reachable"
      # or "timed out waiting for kernel_info_reply" with no upstream
      # detail. Dump the ark log (path set in test-kernels/ark/kernel.json)
      # so CI failures have something to grep.
      - name: Dump ark log
        if: ${{ always() && steps.cargo_test.outcome != 'success' }}
        run: |
          log=test-kernels/ark/ark.log
          if [[ -f "$log" ]]; then
            echo "==== $log ===="
            cat "$log"
          else
            echo "no ark log at $log"
          fi
