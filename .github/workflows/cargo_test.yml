name: "Cargo test"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo_test:
    strategy:
      # Don't abort the mac leg because linux failed (or vice versa) —
      # a failure on one OS is often specific to that OS and we want to
      # see both.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # Ark needs a real R at runtime. Install it out-of-band; the script
      # only downloads the ark binary and writes the kernelspec.
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.0"

      # Cache the ark binary (~40MB download) and the ipykernel venv
      # (~a few seconds to reinstall). Keyed on the install script so any
      # version bump invalidates the cache automatically.
      - name: Cache dev kernels
        uses: actions/cache@v4
        with:
          path: |
            test-kernels/ark
            .jet-dev/venv
          key: ${{ runner.os }}-dev-kernels-${{ hashFiles('scripts/install-dev-kernels.sh') }}

      - name: Install dev kernels
        run: ./scripts/install-dev-kernels.sh

      # Ark dlopens R's `libR.so` and its bundled packages (utils.so, etc.),
      # which are themselves linked against libR.so. The `R` shell wrapper
      # sources `$R_HOME/etc/ldpaths` to set LD_LIBRARY_PATH, but launching
      # ark directly bypasses that — on Linux the loader can't find libR.so
      # and ark panics on startup. Export it once, from R itself, so every
      # subsequent step sees it.
      - name: Export LD_LIBRARY_PATH for ark (Linux)
        if: runner.os == 'Linux'
        run: echo "LD_LIBRARY_PATH=$(R RHOME)/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        id: cargo_test
        run: make test-cargo

      # Kernel-startup failures show up in tests as "kernel not reachable"
      # or "timed out waiting for kernel_info_reply" with no upstream
      # detail. Dump the ark log (path set in test-kernels/ark/kernel.json)
      # so CI failures have something to grep.
      - name: Dump ark log
        if: ${{ always() && steps.cargo_test.outcome != 'success' }}
        run: |
          log=test-kernels/ark/ark.log
          if [[ -f "$log" ]]; then
            echo "==== $log ===="
            cat "$log"
          else
            echo "no ark log at $log"
          fi

      # Snapshot tests spawn jet with `--log <tempfile>`; each `Harness`
      # moves its tempfile into `test-logs/` on drop, prefixed `pass-`
      # or `fail-`. Uploaded on every run so a passing PR still has log
      # context to diff against when investigating a later flake;
      # failures sort under `fail-` in the artifact bundle. `test-logs/`
      # is not cached across runs (unlike `target/`) so the bundle
      # always reflects only this run.
      - name: Upload jet test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jet-test-logs-${{ matrix.os }}
          path: test-logs/
          if-no-files-found: ignore
