[package]
name = "jet"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
libc = "0.2"
base64 = "0.22"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
clap = { version = "4", features = ["derive"] }
env_logger = "0.11"
futures-util = "0.3"
log = "0.4"
progenitor-client = "=0.14.0"
rand = "0.8"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls"] }
rustyline = "14"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.26", default-features = false, features = ["connect", "rustls-tls-native-roots"] }
url = "2"
whoami = "1"

[build-dependencies]
openapiv3 = "2"
# prettyplease and progenitor are pinned exactly: their output gets
# committed to src/kallichore/generated.rs, so any patch release that
# changes whitespace, identifier names, or codegen would dirty the
# working tree for everyone on the next `cargo build`.
prettyplease = "=0.2.37"
progenitor = { version = "=0.14.0", default-features = false }
serde_json = "1"
syn = "2"

[dev-dependencies]
serial_test = "3"
